services:
  masik_db:
    image: mongo:7
    container_name: masik_db
    restart: unless-stopped
    volumes:
      - ./dbdata:/data/db
    networks:
      - mymentech
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  masik_backend:
    build:
      context: ./backend
    container_name: masik_backend
    restart: unless-stopped
    environment:
      PORT: ${PORT:-5000}
      MONGO_URI: ${MONGO_URI:-mongodb://masik_db:27017/masik_db}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in the host environment before deployment}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_ISSUER: ${JWT_ISSUER:-subscription.mymentech.com}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-masik-chada-api}
      NODE_ENV: ${NODE_ENV:-production}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://subscription.mymentech.com}
      GRAPHQL_INTROSPECTION: ${GRAPHQL_INTROSPECTION:-false}
      GRAPHQL_PLAYGROUND: ${GRAPHQL_PLAYGROUND:-false}
      GRAPHQL_MAX_QUERY_DEPTH: ${GRAPHQL_MAX_QUERY_DEPTH:-10}
      GRAPHQL_MAX_QUERY_LENGTH: ${GRAPHQL_MAX_QUERY_LENGTH:-10000}
      GRAPHQL_MAX_VARIABLES_BYTES: ${GRAPHQL_MAX_VARIABLES_BYTES:-20000}
      AUTH_LOGIN_MAX_ATTEMPTS: ${AUTH_LOGIN_MAX_ATTEMPTS:-10}
      AUTH_LOGIN_WINDOW_MS: ${AUTH_LOGIN_WINDOW_MS:-900000}
      AUTH_LOGIN_LOCK_MS: ${AUTH_LOGIN_LOCK_MS:-900000}
      AUTH_LOGIN_FAILED_DELAY_MS: ${AUTH_LOGIN_FAILED_DELAY_MS:-250}
    depends_on:
      masik_db:
        condition: service_healthy
    networks:
      - mymentech

  masik_frontend:
    build:
      context: ./frontend
    container_name: masik_frontend
    restart: unless-stopped
    networks:
      - mymentech

  masik_nginx:
    image: nginx:alpine
    container_name: masik_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - masik_backend
      - masik_frontend
    networks:
      - mymentech

networks:
  mymentech:
    name: mymentech
