name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  backend-tests:
    name: Backend Unit + Integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect backend workspace
        id: backend_check
        run: |
          if [ -f package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.backend_check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        if: steps.backend_check.outputs.exists == 'true'
        run: npm ci

      - name: Lint
        if: steps.backend_check.outputs.exists == 'true'
        run: npm run lint --if-present

      - name: Unit tests (required gate)
        if: steps.backend_check.outputs.exists == 'true'
        run: npm run test:unit

      - name: Integration tests (required gate)
        if: steps.backend_check.outputs.exists == 'true'
        run: npm run test:integration

      - name: No backend yet
        if: steps.backend_check.outputs.exists != 'true'
        run: echo "Backend package.json not present yet; skipping backend gates."

  frontend-tests:
    name: Frontend Unit + E2E Smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect frontend workspace
        id: frontend_check
        run: |
          if [ -f package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.frontend_check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.frontend_check.outputs.exists == 'true'
        run: npm ci

      - name: Lint
        if: steps.frontend_check.outputs.exists == 'true'
        run: npm run lint --if-present

      - name: Unit tests (required gate)
        if: steps.frontend_check.outputs.exists == 'true'
        run: npm run test:unit

      - name: E2E smoke (mobile viewport required gate)
        if: steps.frontend_check.outputs.exists == 'true'
        run: npm run test:e2e:smoke

      - name: No frontend yet
        if: steps.frontend_check.outputs.exists != 'true'
        run: echo "Frontend package.json not present yet; skipping frontend gates."

  migration-gate:
    name: Migration Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect migration gate script
        id: migration_check
        run: |
          if [ -x scripts/ci/migration-gate.sh ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run migration gate
        if: steps.migration_check.outputs.exists == 'true'
        run: scripts/ci/migration-gate.sh

      - name: Migration gate not implemented yet
        if: steps.migration_check.outputs.exists != 'true'
        run: |
          echo "Migration gate script not found."
          echo "Add scripts/ci/migration-gate.sh for count parity, golden record validation, and Bengali fidelity checks."

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: |
          if [ -f backend/Dockerfile ] && [ -f backend/package.json ]; then
            docker build -t masik-backend-ci ./backend
          else
            echo "Skipping backend image build (Dockerfile or package.json missing)."
          fi

      - name: Build frontend image
        run: |
          if [ -f frontend/Dockerfile ] && [ -f frontend/package.json ]; then
            docker build -t masik-frontend-ci ./frontend
          else
            echo "Skipping frontend image build (Dockerfile or package.json missing)."
          fi
